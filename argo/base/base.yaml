apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: base
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: applications/
    repoURL: https://github.com/andrewstewartelliott-lang/argocd
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true